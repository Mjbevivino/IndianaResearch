# /etc/nginx/sites-available/hoosierdata
# After setup, symlink: sudo ln -s /etc/nginx/sites-available/hoosierdata /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name hoosierdata.com www.hoosierdata.com hoosierDataLab.com www.hoosierDataLab.com;

    # Redirect HTTP → HTTPS (Certbot will fill this in, or add manually)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name hoosierdata.com www.hoosierdata.com hoosierDataLab.com www.hoosierDataLab.com;

    # SSL — filled in by Certbot after: sudo certbot --nginx -d hoosierDataLab.com
    # ssl_certificate     /etc/letsencrypt/live/hoosierDataLab.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/hoosierDataLab.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Serve React build (static files)
    root /home/YOUR_USER/hoosier-data-lab/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → FastAPI on port 8000
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # CORS is handled by FastAPI, no need to duplicate here
        proxy_read_timeout 30s;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
